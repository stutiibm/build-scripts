name: Currency Build

on:
  workflow_dispatch:
    branches:
      - master
      - replica-master
    inputs:
      package_name:
        description: 'Name of the package to build'
        required: true
      version:
        description: 'Version of the package'
        required: true
      validate_build_script:
        description: 'Run build validation script'
        required: true
        default: 'false'
      wheel_build:
        description: 'Create wheel for different Python versions'
        required: true
        default: 'false'
      docker_build:
        description: 'Build docker image'
        required: true
        default: 'false'
      enable_trivy:
        description: 'Enable Trivy scan'
        required: true
        default: 'true'
      enable_syft:
        description: 'Enable Syft scan'
        required: true
        default: 'true'
      enable_grype:
        description: 'Enable Grype scan'
        required: true
        default: 'true'

env:
  ENABLE_TRIVY: ${{ inputs.enable_trivy }}
  ENABLE_SYFT: ${{ inputs.enable_syft }}
  ENABLE_GRYPE: ${{ inputs.enable_grype }}

jobs:
  build_info:
    runs-on: ubuntu-24.04-ppc64le
    env:
      PACKAGE_NAME: ${{ inputs.package_name }}
      VERSION: ${{ inputs.version }}
      VALIDATE_BUILD_SCRIPT: ${{ inputs.validate_build_script }}
      WHEEL_BUILD: ${{ inputs.wheel_build }}
      BUILD_DOCKER: ${{ inputs.docker_build }}
      ENABLE_TRIVY: ${{ inputs.enable_trivy }}
      ENABLE_SYFT: ${{ inputs.enable_syft }}
      ENABLE_GRYPE: ${{ inputs.enable_grype }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          echo "Installing system packages..."
          sudo apt update -y
          sudo apt install -y jq file

      - name: Install Python dependencies
        run: |
          echo "Installing Python dependencies..."
          pip3 install --force-reinstall -v "requests==2.31.0"
          pip3 install --upgrade docker

      - name: Get Build Info
        run: |
          echo "Getting build_info..."
          chmod +x ./script/read_buildinfo.sh
          bash ./script/read_buildinfo.sh
          echo "VARIABLE_SH_CONTENT<<EOF" >> $GITHUB_ENV
          cat variable.sh >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload variable.sh as artifact
        uses: actions/upload-artifact@v3
        with:
          name: variable-sh
          path: variable.sh

  build:
    needs: build_info
    if: ${{ inputs.validate_build_script == 'true' }}
    runs-on: ubuntu-24.04-ppc64le
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com -o get-docker.sh
          sudo sh get-docker.sh

      - name: Start Docker with vfs storage driver
        run: |
          sudo systemctl stop docker || true
          sudo killall dockerd || true
          echo '{"storage-driver":"vfs"}' | sudo tee /etc/docker/daemon.json > /dev/null
          sudo dockerd > /tmp/dockerd.log 2>&1 &
          for i in {1..10}; do
            if docker info > /dev/null 2>&1; then
              echo "Docker is up"
              break
            fi
            sleep 3
          done
          if ! docker info > /dev/null 2>&1; then
            echo "Docker failed to start. Dumping logs:"
            cat /tmp/dockerd.log
            exit 1
          fi

      - name: Download variable.sh from artifact
        uses: actions/download-artifact@v3
        with:
          name: variable-sh

      - name: Load Variables
        run: |
          source variable.sh

      - name: Build Package
        run: |
          mkdir package-cache
          sudo mv variable.sh package-cache
          chmod +x ./script/build_package.sh
          bash ./script/build_package.sh
          cloned_package=$(ls -td -- */ | head -n 1)
          sudo mv "$cloned_package" package-cache
          echo "export CLONED_PACKAGE=\"$cloned_package\"" >> package-cache/variable.sh
          cd package-cache
          sudo chown $USER:$USER -R .
          chmod +x ../script/pre_process.sh
          bash ../script/pre_process.sh
          cd $GITHUB_WORKSPACE
          gzip build_log

      - name: Upload Package Build Log as artifact (if needed)
        uses: actions/upload-artifact@v3
        with:
          name: package-build-log
          path: build_log.gz

  wheel_build:
    needs: build
    if: ${{ inputs.wheel_build == 'true' }}
    runs-on: ubuntu-24.04-ppc64le
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11, 3.12, 3.13]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download variable.sh from artifact
        uses: actions/download-artifact@v3
        with:
          name: variable-sh

      - name: Load Variables
        run: |
          source variable.sh

      - name: Build Wheel
        run: |
          chmod +x ./script/build_wheels.sh
          bash ./script/build_wheels.sh
          WHEEL_FILE=*.whl

      - name: Upload Wheel File as artifact
        uses: actions/upload-artifact@v3
        with:
          name: wheel-file
          path: $WHEEL_FILE

  docker_build:
    needs: build
    if: ${{ inputs.docker_build == 'true' }}
    runs-on: ubuntu-24.04-ppc64le
    steps:
      - uses: actions/checkout@v4

      - name: Download variable.sh from artifact
        uses: actions/download-artifact@v3
        with:
          name: variable-sh

      - name: Load Variables
        run: |
          source variable.sh

      - name: Build Docker Image
        run: |
          chmod +x ./script/build_docker.sh
          bash ./script/build_docker.sh
          docker images

      - name: Upload Docker Image as artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: $HOME/build/$GITHUB_REPOSITORY/image.tar

  image_scanner:
    needs: docker_build
    if: ${{ inputs.docker_build == 'true' }}
    runs-on: ubuntu-24.04-ppc64le
    steps:
      - uses: actions/checkout@v4

      - name: Download variable.sh from artifact
        uses: actions/download-artifact@v3
        with:
          name: variable-sh

      - name: Load Variables
        run: |
          source variable.sh

      - name: Download Docker Image
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Run Trivy Image Scan
        if: ${{ inputs.enable_trivy == 'true' }}
        run: |
          chmod +x ./script/scanner-scripts/trivy_image_scan.sh
          bash ./script/scanner-scripts/trivy_image_scan.sh
          mkdir image_trivy
          mv trivy_image_vulnerabilities_results.json trivy_image_sbom_results.cyclonedx image_trivy

      - name: Upload Image Scanner Results as artifact
        uses: actions/upload-artifact@v3
        with:
          name: image-scanner-results
          path: image_trivy
